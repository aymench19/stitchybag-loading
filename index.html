<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StitchyBag</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <img src="logo.png" class="logo" alt="StitchyBag">

    <h1>STITCHY<span>BAG</span></h1>

    <h3>Handmade By Hanen</h3>

    <div class="separator"></div>

    <div class="loader"></div>

    <h2 id="status">
        Préparation de votre boutique...
    </h2>

    <p>
        Merci de patienter, nous préparons quelque chose de beau pour vous.
    </p>

    <div class="features">

        <div class="feature">
            ❤
            <span>Fait main avec passion</span>
        </div>

        <div class="feature">
            👜
            <span>Qualité premium</span>
        </div>

        <div class="feature">
            🌿
            <span>Matériaux sélectionnés</span>
        </div>

    </div>

</div>

<div class="bottom-wave">

    <div class="redirect">
        Vous allez être redirigé automatiquement...
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
